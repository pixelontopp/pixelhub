<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Hub</title>

<style>
/* Modern Smooth Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseBorder {
    0% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f622; }
    50% { border-color: #22c55e; box-shadow: 0 0 20px #22c55e44; }
    100% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f622; }
}

@keyframes successPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#08111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow: hidden;
}

.card{
    width:360px;
    background:#13233f;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 40px #00000055, 0 0 30px #3b82f655;
    animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

h1{
    color:#6bbcff;
    margin-bottom:18px;
}

button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    font-weight: bold;
    cursor:pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button:hover:not(:disabled){
    transform: scale(1.03);
    background: #2563eb;
}

button:disabled {
    background: #1e293b;
    color: #64748b;
    cursor: not-allowed;
}

#status{
    margin-top:15px;
    font-weight:bold;
    color:#6bbcff;
}

/* Custom layout for the unlocked key area */
.key-container {
    margin-top: 10px;
    animation: fadeIn 0.4s ease-out forwards;
}

.key-box {
    color:white; 
    font-size:15px; 
    font-family: 'Courier New', Courier, monospace;
    display:block; 
    margin: 10px 0; 
    background:#050c18; 
    padding:12px; 
    border-radius:8px; 
    border: 1.5px solid #3b82f6;
    letter-spacing: 1px;
    user-select: all;
    animation: pulseBorder 3s infinite ease-in-out;
}

.copy-btn {
    background: #22c55e;
    margin-bottom: 10px;
}

.copy-btn:hover:not(:disabled) {
    background: #16a34a;
}

.success-animate {
    animation: successPop 0.3s ease-in-out;
}
</style>
</head>

<body>

<div class="card">

<h1>Pixel Hub</h1>

<button id="genBtn" onclick="generateKey()">Generate Key</button>

<div id="status"></div>

<a href="https://pixelontopp.github.io/Generated-Keys/" target="_blank">
<button>🔑 GENERATED KEYS</button>
</a>

<a href="https://discord.gg/YOURINVITE" target="_blank">
<button>💬 Discord</button>
</a>

<a href="https://youtube.com/@YOURCHANNEL" target="_blank">
<button>▶️ YouTube</button>
</a>

</div>

<script>
// Configuration Settings
const LINKVERTISE_URL = "https://linkvertise.com/your-link-here"; 
const CLEAN_MAIN_URL = "https://pixelontopp.github.io/pixelhub/";

const MINIMUM_TIME_REQUIRED = 10000; // 10 seconds bypass protection
const BAN_DURATION = 120000; // 2 minutes bypass ban

window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");

    // 1. Check if user is currently timed out/banned
    const bannedUntil = localStorage.getItem('bannedUntil');
    if (bannedUntil && Date.now() < bannedUntil) {
        startBanCountdown(bannedUntil - Date.now());
        return;
    }

    // 2. Check if they already have an unlocked permanent key saved
    const savedPermanentKey = localStorage.getItem('pixelPermanentKey');
    if (savedPermanentKey) {
        showPermanentKey(savedPermanentKey);
        return;
    }

    // 3. Process user landing back from Linkvertise
    if (urlParams.get('status') === 'completed') {
        const clickTime = localStorage.getItem('clickTime');
        const currentTime = Date.now();

        // Speed check to catch link bypass tools
        if (!clickTime || (currentTime - clickTime) < MINIMUM_TIME_REQUIRED) {
            const newBanExpiry = Date.now() + BAN_DURATION;
            localStorage.setItem('bannedUntil', newBanExpiry);
            startBanCountdown(BAN_DURATION);
            return;
        }

        genBtn.innerHTML = "Verifying...";
        genBtn.disabled = true;
        statusDiv.style.color = "#22c55e";
        statusDiv.innerHTML = "Processing system check...";
        
        setTimeout(() => {
            // Generate their static unique 6-digit permanent key identity
            const randomID = Math.floor(100000 + Math.random() * 900000);
            const newPermanentKey = "PIXELKEY_PERM_" + randomID;
            
            // Lock it into browser memory
            localStorage.setItem('pixelPermanentKey', newPermanentKey);
            localStorage.removeItem('clickTime'); 
            
            showPermanentKey(newPermanentKey);
        }, 1200);
    }
});

function generateKey(){
    if(localStorage.getItem('pixelPermanentKey')) return;

    // Time stamp the departure
    localStorage.setItem('clickTime', Date.now());
    
    document.getElementById("status").style.color = "#6bbcff";
    document.getElementById("status").innerHTML = "Redirecting to Linkvertise...";

    setTimeout(() => {
        window.location.href = https://link-hub.net/1406248/x5BzaK3UXP3R;
    }, 1000);
}

// Renders the key box layout with your new Copy button
function showPermanentKey(key) {
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");
    
    genBtn.innerHTML = "Key Unlocked";
    genBtn.style.background = "#1e293b"; 
    genBtn.disabled = true;
    
    statusDiv.innerHTML = `
        <div class="key-container">
            <span class="key-box" id="keyText">${key}</span>
            <button class="copy-btn" id="copyBtn" onclick="copyAndRedirect('${key}')">📋 Copy</button>
        </div>
    `;
}

// Copies the key, runs animations, and cleans up the URL string
function copyAndRedirect(key) {
    navigator.clipboard.writeText(key).then(() => {
        const copyBtn = document.getElementById("copyBtn");
        
        // Trigger success animation styles
        copyBtn.classList.add("success-animate");
        copyBtn.innerHTML = "✨ Copied Key!";
        copyBtn.style.background = "#10b981"; 
        
        // Delay redirection slightly so they can appreciate the clean animation
        setTimeout(() => {
            window.location.href = https://pixelontopp.github.io/pixelhub/;
        }, 1200);
    }).catch(err => {
        // Fallback redirection safety net
        window.location.href = https://pixelontopp.github.io/pixelhub/;
    });
}

function startBanCountdown(duration) {
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");
    
    genBtn.disabled = true;
    genBtn.innerHTML = "System Locked";
    genBtn.style.background = "#ef4444"; 

    let timeRemaining = Math.ceil(duration / 1000);
    statusDiv.style.color = "#ff4a4a";
    statusDiv.innerHTML = `Bypass detected! Blocked for ${timeRemaining}s`;

    const banTimer = setInterval(() => {
        timeRemaining--;
        statusDiv.innerHTML = `Bypass detected! Blocked for ${timeRemaining}s`;

        if (timeRemaining <= 0) {
            clearInterval(banTimer);
            localStorage.removeItem('bannedUntil');
            localStorage.removeItem('clickTime');
            
            genBtn.disabled = false;
            genBtn.innerHTML = "Generate Key";
            genBtn.style.background = "#3b82f6";
            statusDiv.innerHTML = "";
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }, 1000);
}
</script>

</body>
</html>
