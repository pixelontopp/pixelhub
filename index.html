<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Hub</title>

<style>
/* Modern Smooth Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseBorder {
    0% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f622; }
    50% { border-color: #22c55e; box-shadow: 0 0 20px #22c55e44; }
    100% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f622; }
}

@keyframes successPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#08111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow: hidden;
}

.card{
    width:360px;
    background:#13233f;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 40px #00000055, 0 0 30px #3b82f655;
    animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

h1{
    color:#6bbcff;
    margin-bottom:18px;
}

button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    font-weight: bold;
    cursor:pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button:hover:not(:disabled){
    transform: scale(1.03);
    background: #2563eb;
}

button:disabled {
    background: #1e293b;
    color: #64748b;
    cursor: not-allowed;
}

/* Custom Gold Tint Styling for Permanent Key Button */
#permBtn {
    background: #eab308;
    color: #0f172a;
}

#permBtn:hover:not(:disabled) {
    background: #ca8a04;
    transform: scale(1.03);
}

#status{
    margin-top:15px;
    font-weight:bold;
    color:#6bbcff;
    min-height: 20px;
}

/* Custom layout for the unlocked key area */
.key-container {
    margin-top: 10px;
    animation: fadeIn 0.4s ease-out forwards;
}

.key-box {
    color:white; 
    font-size:15px; 
    font-family: 'Courier New', Courier, monospace;
    display:block; 
    margin: 10px 0; 
    background:#050c18; 
    padding:12px; 
    border-radius:8px; 
    border: 1.5px solid #3b82f6;
    letter-spacing: 1px;
    user-select: all;
    animation: pulseBorder 3s infinite ease-in-out;
}

.copy-btn {
    background: #22c55e;
    margin-bottom: 10px;
}

.copy-btn:hover:not(:disabled) {
    background: #16a34a;
}

.success-animate {
    animation: successPop 0.3s ease-in-out;
}
</style>
</head>

<body>

<div class="card">

<h1>Pixel Hub</h1>

<button id="genBtn" onclick="generateKey()">Generate Key</button>
<button id="permBtn" onclick="goToPermanentPage()">⭐ Permanent Key</button>

<div id="status"></div>

<a href="https://pixelontopp.github.io/Generated-Keys/" target="_blank">
<button>🔑 GENERATED KEYS</button>
</a>

<a href="https://discord.gg/2vmkp47b4" target="_blank">
<button>💬 Discord</button>
</a>

<a href="https://youtube.com/@pixelontopp" target="_blank">
<button>▶️ YouTube</button>
</a>

</div>

<script>
// ==================== CONFIGURATION SETTINGS ====================
const BACKEND_URL = "https://pixel-key-backend.helloytrbx.workers.dev"; 
const LINKVERTISE_URL = "https://link-hub.net/1406248/x5BzaK3UXP3R"; 
const CLEAN_MAIN_URL = "https://pixelontopp.github.io/pixelhub/";

// Your exact permanent key generator page URL integrated here!
const PERM_KEY_PAGE_URL = "https://pixelontopp.github.io/Permanent-Key-Generator"; 

const MINIMUM_TIME_REQUIRED = 15000; // 15 seconds bypass protection
const BAN_DURATION = 120000; // 2 minutes bypass ban
// ===============================================================

window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");

    // 1. Check if user is currently timed out/banned
    const bannedUntil = localStorage.getItem('bannedUntil');
    if (bannedUntil && Date.now() < bannedUntil) {
        startBanCountdown(bannedUntil - Date.now());
        return;
    }

    // 2. Check if they already have an unlocked permanent key saved
    const savedPermanentKey = localStorage.getItem('pixelPermanentKey');
    if (savedPermanentKey) {
        showPermanentKey(savedPermanentKey);
        return;
    }

    // 3. Process user landing back from Linkvertise (?status=completed)
    if (urlParams.get('status') === 'completed') {
        const clickTime = localStorage.getItem('clickTime');
        const currentTime = Date.now();

        if (!clickTime || (currentTime - clickTime) < MINIMUM_TIME_REQUIRED) {
            const newBanExpiry = Date.now() + BAN_DURATION;
            localStorage.setItem('bannedUntil', newBanExpiry);
            startBanCountdown(BAN_DURATION);
            return;
        }

        genBtn.innerHTML = "Verifying...";
        genBtn.disabled = true;
        statusDiv.style.color = "#22c55e";
        statusDiv.innerHTML = "Syncing key with secure database...";
        
        const randomID = Math.floor(100000 + Math.random() * 900000);
        const newPermanentKey = "PIXELKEY_PERM_" + randomID;

        fetch(`${BACKEND_URL}/addkey`, {
            method: "POST",
            headers: { "Content-Type": "text/plain" }, // Keeps your smooth text/plain mobile fix intact!
            body: JSON.stringify({ secretCode: "PIXELMASTER_2026", generatedKey: newPermanentKey })
        })
        .then(res => {
            if (!res.ok) throw new Error();
            return res.json();
        })
        .then(data => {
            if (data.success) {
                localStorage.setItem('pixelPermanentKey', newPermanentKey);
                localStorage.removeItem('clickTime'); 
                showPermanentKey(newPermanentKey);
                statusDiv.innerHTML = "";
            }
        })
        .catch(err => {
            statusDiv.style.color = "#ef4444";
            statusDiv.innerHTML = "Database registration error! Try again.";
            genBtn.disabled = false;
            genBtn.innerHTML = "Generate Key";
        });
    }
});

function generateKey(){
    // Hard block if they already possess an active permanent key
    if(localStorage.getItem('pixelPermanentKey')) return;

    localStorage.setItem('clickTime', Date.now());
    
    document.getElementById("status").style.color = "#6bbcff";
    document.getElementById("status").innerHTML = "Redirecting to Linkvertise...";

    setTimeout(() => {
        window.location.href = LINKVERTISE_URL;
    }, 1000);
}

function goToPermanentPage() {
    // Hard block if they already possess an active permanent key
    if(localStorage.getItem('pixelPermanentKey')) return;

    document.getElementById("status").style.color = "#6bbcff";
    document.getElementById("status").innerHTML = "Opening Secret Code Portal...";

    setTimeout(() => {
        window.location.href = PERM_KEY_PAGE_URL;
    }, 1000);
}

function showPermanentKey(key) {
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");
    const permBtn = document.getElementById("permBtn");
    
    // Completely locks down regular generation
    genBtn.innerHTML = "Key Unlocked";
    genBtn.style.background = "#1e293b"; 
    genBtn.style.color = "#64748b";
    genBtn.disabled = true;
    
    // Completely locks down permanent key generation page access
    if (permBtn) {
        permBtn.innerHTML = "Permanent Key Active";
        permBtn.style.background = "#1e293b"; 
        permBtn.style.color = "#64748b";
        permBtn.disabled = true;
    }
    
    statusDiv.innerHTML = `
        <div class="key-container">
            <span class="key-box" id="keyText">${key}</span>
            <button class="copy-btn" id="copyBtn" onclick="copyAndRedirect('${key}')">📋 Copy</button>
        </div>
    `;
}

function copyAndRedirect(key) {
    navigator.clipboard.writeText(key).then(() => {
        const copyBtn = document.getElementById("copyBtn");
        
        copyBtn.classList.add("success-animate");
        copyBtn.innerHTML = "✨ Copied Key!";
        copyBtn.style.background = "#10b981"; 
        
        setTimeout(() => {
            window.location.href = CLEAN_MAIN_URL;
        }, 1200);
    }).catch(err => {
        window.location.href = CLEAN_MAIN_URL;
    });
}

function startBanCountdown(duration) {
    const statusDiv = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");
    const permBtn = document.getElementById("permBtn");
    
    genBtn.disabled = true;
    genBtn.innerHTML = "System Locked";
    genBtn.style.background = "#ef4444"; 

    if (permBtn) {
        permBtn.disabled = true;
        permBtn.style.background = "#1e293b";
        permBtn.style.color = "#64748b";
    }

    let timeRemaining = Math.ceil(duration / 1000);
    statusDiv.style.color = "#ff4a4a";
    statusDiv.innerHTML = `Bypass detected! Blocked for ${timeRemaining}s`;

    const banTimer = setInterval(() => {
        timeRemaining--;
        statusDiv.innerHTML = `Bypass detected! Blocked for ${timeRemaining}s`;

        if (timeRemaining <= 0) {
            clearInterval(banTimer);
            localStorage.removeItem('bannedUntil');
            localStorage.removeItem('clickTime');
            
            genBtn.disabled = false;
            genBtn.innerHTML = "Generate Key";
            genBtn.style.background = "#3b82f6";

            if (permBtn) {
                permBtn.disabled = false;
                permBtn.style.background = "#eab308";
                permBtn.style.color = "#0f172a";
            }

            statusDiv.innerHTML = "";
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }, 1000);
}
</script>

</body>
</html>
